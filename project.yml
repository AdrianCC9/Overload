name: Overload
options:
  bundleIdPrefix: com.overload
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    GENERATE_INFOPLIST_FILE: YES
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  Overload:
    type: application
    platform: iOS
    sources:
      - Overload
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.overload.app
        INFOPLIST_KEY_CFBundleDisplayName: Overload
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
  OverloadUnitTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/UnitTests
    dependencies:
      - target: Overload
